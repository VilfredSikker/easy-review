name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  # npm publish uses OIDC trusted publishing when configured; token fallback via secrets.
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build er (TUI)
        run: cargo build --release --target ${{ matrix.target }} -p er-tui

      - name: Build er-mcp
        run: cargo build --release --target ${{ matrix.target }} -p er-mcp

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../er-${{ matrix.target }}.tar.gz er
          tar -czf ../../../er-mcp-${{ matrix.target }}.tar.gz er-mcp
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.target }}
          path: |
            er-${{ matrix.target }}.tar.gz
            er-mcp-${{ matrix.target }}.tar.gz

      - name: Upload er-mcp binary
        uses: actions/upload-artifact@v4
        with:
          name: ermcp-bin-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/er-mcp
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            er-*.tar.gz
            er-mcp-*.tar.gz

  npm:
    name: Publish easy-review-mcp to npm
    needs: release
    runs-on: ubuntu-latest
    # Opt-in: set repo variable PUBLISH_NPM=true and configure NPM_TOKEN (or trusted publishing).
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ermcp-bin-*
          path: artifacts

      - name: Stage platform binaries
        run: |
          set -euo pipefail
          declare -A MAP=(
            [aarch64-apple-darwin]=darwin-arm64
            [x86_64-apple-darwin]=darwin-x64
            [x86_64-unknown-linux-gnu]=linux-x64
          )
          for tgt in "${!MAP[@]}"; do
            key="${MAP[$tgt]}"
            src="artifacts/ermcp-bin-$tgt/er-mcp"
            dst="npm/platforms/$key/er-mcp"
            cp "$src" "$dst"
            chmod +x "$dst"
            echo "staged $tgt -> $dst"
          done

      - name: Verify versions match tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          for dir in npm/er-mcp npm/platforms/darwin-arm64 npm/platforms/darwin-x64 npm/platforms/linux-x64; do
            PKG=$(node -p "require('./$dir/package.json').version")
            if [ "$TAG" != "$PKG" ]; then
              echo "Version mismatch in $dir: $PKG != tag $TAG"
              exit 1
            fi
          done
          # The launcher's optionalDependencies pins must also match the tag, or
          # npm silently skips the (nonexistent) platform version and every user
          # falls back to the GitHub download this change exists to avoid.
          for pkg in easy-review-mcp-darwin-arm64 easy-review-mcp-darwin-x64 easy-review-mcp-linux-x64; do
            PIN=$(node -p "require('./npm/er-mcp/package.json').optionalDependencies['$pkg']")
            if [ "$TAG" != "$PIN" ]; then
              echo "optionalDependencies pin mismatch: $pkg=$PIN != tag $TAG"
              exit 1
            fi
          done

      - name: Publish platform packages
        run: |
          set -euo pipefail
          for key in darwin-arm64 darwin-x64 linux-x64; do
            ( cd "npm/platforms/$key" && npm publish --access public )
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish launcher
        run: cd npm/er-mcp && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
