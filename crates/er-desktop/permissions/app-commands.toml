# All application IPC commands (main window). Required once explicit capabilities
# are enabled in tauri.conf.json — plugin-only permissions are not enough.

[[permission]]
identifier = "allow-app-commands"
description = "All Easy Review application commands"
commands.allow = [
  "start_window_drag",
  "get_snapshot",
  "toggle_panel",
  "select_file",
  "next_file",
  "prev_file",
  "jump_to_unreviewed",
  "set_mode",
  "toggle_reviewed",
  "mark_reviewed",
  "unmark_reviewed",
  "open_in_editor",
  "open_source",
  "open_url_in_browser",
  "reveal_er_folder",
  "list_review_revisions",
  "read_review_json",
  "next_hunk",
  "prev_hunk",
  "toggle_compacted",
  "set_filter",
  "clear_filter",
  "add_comment",
  "add_question",
  "reply_to_thread",
  "delete_thread",
  "resolve_thread",
  "refresh_diff",
  "force_refresh_diff",
  "refresh_github_status",
  "pull_github_comments",
  "push_github_comments",
  "submit_github_review",
  "submit_github_pr_decision",
  "post_github_pr_comment",
  "run_ai_review",
  "run_ai_validate",
  "set_ai_model",
  "list_ai_providers",
  "set_ai_selection",
  "promote_to_comment",
  "ask_ai",
  "open_pr_url",
  "open_remote_pr",
  "open_worktree",
  "dismiss_finding",
  "promote_finding_to_comment",
  "reply_to_finding",
  "export_review",
  "export_review_to_file",
  "export_to_agent",
  "open_commit_composer",
  "select_commit",
  "poll",
  "open_local_branch",
  "open_pr_branch",
  "open_pr_review",
  "prefetch_pr_open",
  "refresh_pr_list",
  "open_inbox_item",
  "mark_inbox_item_read",
  "mark_all_inbox_read",
  "clear_read_inbox_items",
  "refresh_notifications",
  "dismiss_remote_pr",
  "track_pr",
  "untrack_pr",
  "list_available_prs",
  "set_active_project",
  "add_tracked_branch",
  "remove_tracked_branch",
  "list_available_branches",
  "open_project_branch",
  "new_tab",
  "close_tab",
