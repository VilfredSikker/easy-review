  "save_annotation_screenshot",
  "read_annotation_screenshot",
  "terminal_spawn",
  "terminal_write",
  "terminal_resize",
  "terminal_close",
  "detect_dev_url",
  "set_diff_source",
  "get_background_task_log",
  "browser_ensure",
  "browser_hide",
  "browser_set_bounds",
  "browser_navigate",
  "browser_host_message",
  "browser_send_to_page",
  "browser_set_annotate_mode",
