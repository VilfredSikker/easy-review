[ai_hub.providers.cursor]
label = "Cursor"
command = "agent"
family = "cursor"
models_command = ["agent", "--list-models"]
args = [
    "--print",
    "--trust",
    "--force",
    "--output-format",
    "stream-json",
    "-p",
    "{prompt}",
]

[[ai_hub.providers.cursor.models]]
id = "grok-4.5"
label = "Grok 4.5"
description = "Long-running agentic · coding + knowledge work"
args = ["--model", "cursor-grok-4.5-high"]
cost_per_1k_in = 0.002
cost_per_1k_out = 0.006
avg_latency_ms = 18000

[[ai_hub.providers.cursor.models]]
id = "composer-2.5"
label = "Composer 2.5"
description = "Agentic coding · frontier quality at low cost"
args = ["--model", "composer-2.5"]
cost_per_1k_in = 0.0005
cost_per_1k_out = 0.0025
avg_latency_ms = 12000

[ai_hub.providers.opencode]
label = "OpenCode"
command = "opencode"
family = "opencode"
models_command = ["opencode", "models"]
# `{prompt}` must stay last: OpenCode treats the message as a positional arg.
# Model/effort flags are inserted before `{prompt}` by extend_provider_model_args.
args = ["run", "--auto", "{prompt}"]

[[ai_hub.providers.opencode.models]]
id = "default"
label = "Default"
description = "Use OpenCode’s configured default model"
args = []
effort_levels = ["low", "medium", "high", "xhigh", "max"]
cost_per_1k_in = 0.002
cost_per_1k_out = 0.010
avg_latency_ms = 14000

[[ai_hub.providers.opencode.models]]
id = "claude-sonnet-4-5"
label = "Claude Sonnet 4.5"
description = "Strong coding + tool use via Anthropic"
args = ["--model", "anthropic/claude-sonnet-4-5"]
effort_levels = ["high", "max"]
cost_per_1k_in = 0.003
cost_per_1k_out = 0.015
avg_latency_ms = 14000

[[ai_hub.providers.opencode.models]]
