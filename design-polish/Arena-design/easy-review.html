<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>easy-review — affordance pass</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-app); overscroll-behavior: none; }
    body { font-family: var(--font-ui); color: var(--fg); font-size: var(--t-base); }
    #root { width: 100%; height: 100%; }
    /* keep scrollbars unobtrusive on dark surfaces */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); border: 2px solid transparent; background-clip: padding-box; }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#0c121f">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Simplified workspace silhouette: 3 columns + orange branch dot -->
      <rect x="20" y="40" width="36" height="130" rx="6" fill="#131927" stroke="rgba(255,255,255,0.06)" />
      <rect x="62" y="40" width="44" height="130" rx="6" fill="#131927" stroke="rgba(255,255,255,0.06)" />
      <rect x="112" y="40" width="68" height="130" rx="6" fill="#0e1420" stroke="rgba(255,255,255,0.06)" />
      <!-- Code lines in main column -->
      <rect x="120" y="56" width="44" height="3" rx="1.5" fill="rgba(95,217,112,0.5)" />
      <rect x="120" y="64" width="52" height="3" rx="1.5" fill="rgba(95,217,112,0.5)" />
      <rect x="120" y="72" width="36" height="3" rx="1.5" fill="rgba(95,217,112,0.5)" />
      <rect x="120" y="82" width="40" height="3" rx="1.5" fill="rgba(255,138,130,0.4)" />
      <!-- Active branch tick -->
      <circle cx="34" cy="74" r="3" fill="#ff7a2b" />
      <rect x="40" y="72" width="10" height="4" rx="1" fill="rgba(255,255,255,0.18)" />
    </svg>
  </template>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="toast.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="left-rail.jsx"></script>
  <script type="text/babel" src="files-rail.jsx"></script>
  <script type="text/babel" src="diff-view.jsx"></script>
  <script type="text/babel" src="right-rail.jsx"></script>
  <script type="text/babel" src="terminal.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
