<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>01 · Review tab — Handoff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="handoff.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
</head>
<body>
  <div class="handoff-shell" id="shell">
    <header class="handoff-header">
      <div class="crumb"><a href="index.html">← Handoff</a><span>·</span><span>01</span></div>
      <div class="title">AI Review tab</div>
      <div class="spacer"></div>
      <div class="meta">Right rail · 320–360 px wide</div>
    </header>

    <div class="state-bar" id="state-bar">
      <span class="lbl">State</span>
      <!-- buttons mounted by JS -->
    </div>

    <main class="handoff-stage">
      <div class="stage-canvas stage-canvas--rail">
        <div class="inner" id="root"></div>
      </div>
    </main>

    <aside class="handoff-notes" id="notes">
      <!-- notes mounted by JS, change with state -->
    </aside>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../data.jsx"></script>
  <script type="text/babel" src="../data-agents.jsx"></script>
  <script type="text/babel" src="../review-multi.jsx"></script>
  <script type="text/babel" src="../review-empty-states.jsx"></script>

  <script type="text/babel">
    const STATES = [
      {
        id: 'empty', label: 'Empty',
        title: 'Nothing run yet',
        blurb: 'First touch. Two CTAs: a Quick review for a single Sonnet pass, and the Arena for a multi-reviewer debate. A specialist row below offers one-click runs for each role.',
        notes: [
          { key: 'Component', val: '<ReviewEmptyState>' },
          { key: 'Triggers',  val: 'onRunQuick, onNewArena, onRunSpecialist(id)' },
          { key: 'Empty signal', val: 'No review records on this branch.' },
        ],
      },
      {
        id: 'general-only', label: '1 General',
        title: 'Only General reviewed',
        blurb: 'A quick Sonnet pass exists, nothing else. We show its findings compact (max 3), then a "Level up this review" zone — primary CTA is "Run as Arena" (keeps General as baseline). Single-agent pills below for an alternative second opinion.',
        notes: [
          { key: 'Component', val: '<ReviewGeneralOnlyState>' },
          { key: 'Triggers', val: 'onNewArena, onAddAgent(id)' },
          { key: 'New review', val: 'Top "+ New review" button opens the launcher (same as onNewArena).' },
        ],
      },
      {
        id: 'specialized-only', label: '1 Specialist',
        title: 'Only one specialist reviewed',
        blurb: 'Single specialist (Security in the demo). Same shape as General-only, plus a yellow "blind spots" callout naming what wasn\'t covered. Pills row leads with General.',
        notes: [
          { key: 'Component', val: '<ReviewSpecializedOnlyState agentId="security">' },
          { key: 'Triggers', val: 'onNewArena, onAddAgent(id), onAddGeneral' },
          { key: 'Warning', val: 'List the not-yet-reviewed specialties by name. Drives the upgrade.' },
        ],
      },
      {
        id: 'multi-specialists', label: '3 Specialists',
        title: '3 specialists ran independently',
        blurb: 'General, Security, Professor each ran solo — no reconciliation. User can pick "All" or any one agent, then filter by severity. Default severity is "high" so the highest-signal items are surfaced first.',
        notes: [
          { key: 'Component', val: '<ReviewMultiSpecialistsState>' },
          { key: 'Filters', val: 'agent ∈ {all, general, security, professor} × severity ∈ {all, high, med, low}' },
          { key: 'Default', val: 'agent=all, severity=high' },
          { key: 'Bottom CTA', val: '"Promote to Arena" — pre-fills the same 3 agents.' },
        ],
      },
      {
        id: 'multi-runs', label: 'Multi-runs',
        title: 'Multiple separate review sessions',
        blurb: 'Run history. Each card is one session with its own roster, timestamp, and findings. Expand any to see its findings; "LATEST" marks the newest. Bottom CTA promotes to an Arena pre-filled with the union of all rosters.',
        notes: [
          { key: 'Component', val: '<ReviewMultiRunsState>' },
          { key: 'Data', val: 'DATA_REVIEW_RUNS — array, newest-first' },
          { key: 'Promote', val: 'Union of agentIds across all runs becomes the Arena pre-selection.' },
          { key: 'Title', val: 'User-typed title at run creation (see view 02).' },
        ],
      },
      {
        id: 'full', label: 'Full + Arena',
        title: 'Multi-agent run with an Arena result',
        blurb: 'The final shape. An Arena entry card at the top (status, count, agent avatars, "+ New run" / "Open last"), then the multi-agent picker. Picker has 3 variants: Chips (default), Stacked, or Merged.',
        notes: [
          { key: 'Component', val: '<ReviewMulti pickerMode="chips">' },
          { key: 'Arena card', val: 'Always visible; click body to open the Arena overlay (view 04).' },
          { key: 'Picker variants', val: 'chips | stacked | merged — flip in production based on density preference.' },
        ],
      },
    ];

    const noStub = () => {};

    function Mount() {
      const [stateId, setStateId] = React.useState('full');
      const state = STATES.find((s) => s.id === stateId);

      React.useEffect(() => {
        renderStateBar(stateId, setStateId);
        renderNotes(state);
      }, [stateId]);

      return (
        <window.ReviewMulti
          pickerMode="chips"
          reviewState={stateId}
          onOpenArena={noStub}
          onNewRun={noStub}
          onRunQuick={noStub}
          onRunSpecialist={noStub}
        />
      );
    }

    function renderStateBar(active, setActive) {
      const bar = document.getElementById('state-bar');
      // wipe old buttons (keep .lbl)
      [...bar.querySelectorAll('.state-pill')].forEach((b) => b.remove());
      STATES.forEach((s) => {
        const btn = document.createElement('button');
        btn.className = 'state-pill';
        btn.setAttribute('aria-pressed', s.id === active ? 'true' : 'false');
        btn.textContent = s.label;
        btn.onclick = () => setActive(s.id);
        bar.appendChild(btn);
      });
    }

    function renderNotes(state) {
      const el = document.getElementById('notes');
      el.innerHTML = `
        <div class="notes-section">
          <h3>State · ${state.label}</h3>
          <p style="font-size:13px;font-weight:600;color:var(--fg);">${state.title}</p>
          <p>${state.blurb}</p>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Implementation</h3>
          ${state.notes.map((n) => `
            <div class="row">
              <span class="key">${n.key}</span>
              <span class="val">${n.val}</span>
            </div>
          `).join('')}
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Shared rules</h3>
          <ul>
            <li>Rail width: 320–360 px. Findings collapse to two lines.</li>
            <li>Severity dot colors: <code>--err</code> · <code>--warn</code> · <code>--info</code>.</li>
            <li>Every state has at least one path to "start a new review".</li>
            <li>Auto-prompt the launcher when the rail is empty.</li>
          </ul>
        </div>
      `;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Mount />);
  </script>
</body>
</html>
