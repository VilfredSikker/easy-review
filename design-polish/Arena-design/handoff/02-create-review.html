<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>02 · Start a review — Handoff</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="handoff.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <style>
    /* Override stage so the launcher renders against a faux IDE backdrop */
    .handoff-stage {
      padding: 0;
      display: block;
    }
    .faux-app {
      width: 100%; height: 100%;
      background:
        linear-gradient(180deg, var(--bg-1), var(--bg-0)),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 28px);
      position: relative;
      overflow: hidden;
    }
    .faux-app::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 240px 100%;
      opacity: 0.4;
    }
    /* The launcher modal uses position:fixed inset:0 — contain it to the stage
       by giving the host a transform (creates a new containing block). */
    .faux-app .launcher-host {
      position: absolute; inset: 0;
      transform: translateZ(0);
    }
  </style>
</head>
<body>
  <div class="handoff-shell" id="shell">
    <header class="handoff-header">
      <div class="crumb"><a href="index.html">← Handoff</a><span>·</span><span>02</span></div>
      <div class="title">Start a review</div>
      <div class="spacer"></div>
      <div class="meta">Modal 720 × auto · Slide-over 420 × 100%</div>
    </header>

    <div class="state-bar" id="state-bar">
      <span class="lbl">Variant</span>
    </div>

    <main class="handoff-stage">
      <div class="faux-app">
        <div class="launcher-host" id="root"></div>
      </div>
    </main>

    <aside class="handoff-notes" id="notes"></aside>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="../data.jsx"></script>
  <script type="text/babel" src="../data-agents.jsx"></script>
  <script type="text/babel" src="../file-picker.jsx"></script>
  <script type="text/babel" src="../arena-launcher.jsx"></script>

  <script type="text/babel">
    const VARIANTS = [
      {
        id: 'modal', label: 'Modal',
        title: 'Centered modal',
        blurb: 'Default. Reachable from "+ New review" / "+ New run" / "Open Arena". Auto-focuses; Esc closes; Enter starts.',
        notes: [
          { key: 'Component', val: '<ArenaLauncher variant="modal">' },
          { key: 'Width',     val: '720 px (capped at 90vh)' },
          { key: 'Sections',  val: 'Mode toggle · Title · Reviewer grid · Run settings · Footer' },
          { key: 'Min picks', val: '1 (single review). 2+ becomes an Arena.' },
        ],
      },
      {
        id: 'inline', label: 'Slide-over',
        title: 'Slide-over panel',
        blurb: 'Same form, slides in from the right rail. Used when the user is mid-task and wants peripheral access — the diff stays visible.',
        notes: [
          { key: 'Component', val: '<ArenaLauncher variant="inline">' },
          { key: 'Width',     val: '420 px · full height' },
          { key: 'Behavior',  val: 'Backdrop dimmed; click backdrop or Esc to close.' },
        ],
      },
    ];

    function Mount() {
      const [variantId, setVariantId] = React.useState('modal');
      const variant = VARIANTS.find((v) => v.id === variantId);

      React.useEffect(() => {
        renderStateBar(variantId, setVariantId);
        renderNotes(variant);
      }, [variantId]);

      return (
        <window.ArenaLauncher
          open={true}
          variant={variantId}
          onClose={() => {}}
          onStart={() => {}}
        />
      );
    }

    function renderStateBar(active, setActive) {
      const bar = document.getElementById('state-bar');
      [...bar.querySelectorAll('.state-pill')].forEach((b) => b.remove());
      VARIANTS.forEach((s) => {
        const btn = document.createElement('button');
        btn.className = 'state-pill';
        btn.setAttribute('aria-pressed', s.id === active ? 'true' : 'false');
        btn.textContent = s.label;
        btn.onclick = () => setActive(s.id);
        bar.appendChild(btn);
      });
    }

    function renderNotes(state) {
      const el = document.getElementById('notes');
      el.innerHTML = `
        <div class="notes-section">
          <h3>Variant · ${state.label}</h3>
          <p style="font-size:13px;font-weight:600;color:var(--fg);">${state.title}</p>
          <p>${state.blurb}</p>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Implementation</h3>
          ${state.notes.map((n) => `
            <div class="row"><span class="key">${n.key}</span><span class="val">${n.val}</span></div>
          `).join('')}
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Mode toggle</h3>
          <ul>
            <li><strong>General models</strong> — same prompt across frontier LLMs (Opus 4.7, Sonnet 4.5, GPT-5.5, Gemini 2.5, Haiku 4.5, Grok 3).</li>
            <li><strong>Specialized agents</strong> — different lens per role (General, Security, Professor, Performance, Style, Tests).</li>
          </ul>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Title field</h3>
          <p>Optional. Placeholder shows an <strong>auto-generated suggestion</strong> that updates with rounds + reviewers: prefix is <code>Quick</code>/<code>Standard</code>/<code>Deep</code> by round count, body is the reviewer roster.</p>
          <p>"Use suggestion" copies the placeholder into the field for editing. Submitting blank uses the suggestion.</p>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Run settings</h3>
          <ul>
            <li><strong>Rounds</strong> — 1 to 5. Only meaningful when ≥2 reviewers (Arena).</li>
            <li><strong>Auto-accept</strong> — confidence floor. Findings at or above ship without review.</li>
            <li><strong>Scope</strong> — <code>Branch</code> (default, every file) or <code>Selected files</code> (opens picker — see below).</li>
          </ul>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>File picker</h3>
          <p>Re-uses the existing "Review selected files" modal. Click <em>Selected files…</em> in the Scope row to open. Esc / <code>/</code> for filter focus / mark-all / unmark-all all wired.</p>
        </div>
        <div class="notes-divider"></div>
        <div class="notes-section">
          <h3>Footer</h3>
          <ul>
            <li>Reviewer avatar stack · "Single review" or "Arena · N reviewers" eyebrow.</li>
            <li>Estimate: time (~Ns) and cost ($X.XX) updated live.</li>
            <li>Primary CTA label changes: <code>Start review</code> (1 reviewer) or <code>Start arena</code> (2+).</li>
            <li>Disabled when zero picks.</li>
          </ul>
        </div>
      `;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Mount />);
  </script>
</body>
</html>
